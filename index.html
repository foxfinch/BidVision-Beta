<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BidVision &mdash; Smart tools for smarter bidding</title>
  <meta name="description" content="BidVision helps flight attendants find the trips that fit their life. Coming soon.">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cognac: #8B5E3C;
      --cognac-dark: #6F4A2F;
      --sage: #5B7A5B;
      --surface-app: #F4F2EF;
      --text-primary: #2A2A28;
      --text-secondary: #5A5855;
      --text-muted: #7A766F;
      --font-sans: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-app: #080B12;
        --text-primary: #F9F6F2;
        --text-secondary: #D6D1CB;
        --text-muted: #B0ACA6;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--surface-app);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .hero-icon { width: 72px; height: 72px; margin-bottom: 16px; }
    .brand { font-size: 2.5rem; letter-spacing: 0.02em; margin: 0 0 8px; }
    .brand-bid { font-weight: 700; color: var(--cognac); }
    .brand-vision { font-weight: 300; letter-spacing: 0.06em; color: var(--cognac); }
    .tagline { font-size: 1.125rem; color: var(--text-secondary); margin: 0 0 8px; }
    .coming-soon {
      font-size: 0.8125rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin: 0 0 32px;
    }
    .cta {
      display: inline-block;
      background: var(--cognac);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      min-height: 44px;
      transition: background 150ms cubic-bezier(0, 0, 0.2, 1);
    }
    .cta:hover { background: var(--cognac-dark); }
    .privacy-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(91, 122, 91, 0.1);
      color: var(--sage);
      font-size: 0.8125rem;
      padding: 6px 12px;
      border-radius: 9999px;
      margin-top: 28px;
    }
    .privacy-badge svg { width: 14px; height: 14px; }
    .footer {
      margin-top: 40px;
      font-size: 0.75rem;
      line-height: 1.6;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <img src="beta/assets/icon.png" alt="BidVision" class="hero-icon">
  <h1 class="brand">
    <span class="brand-bid">BID</span><span class="brand-vision">VISION</span>
  </h1>
  <p class="tagline">Smart tools for smarter bidding.</p>
  <p class="coming-soon">Coming soon</p>

  <a href="/beta" class="cta">Apply for beta test</a>

  <span class="privacy-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    All data stays on your device
  </span>

  <footer class="footer">
    BidVision, a product of FoxFinch Adaptations LLC.<br>
    &copy; 2026 FoxFinch Adaptations LLC. Not affiliated with or endorsed by any airline.
  </footer>
</body>
</html>
